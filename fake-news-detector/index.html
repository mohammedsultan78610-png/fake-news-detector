<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fake News Detector</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 10px;
    }
    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 16px;
    }
    button {
      padding: 12px 24px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background: #0056b3; }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border-radius: 8px;
      display: none;
    }
    .source { margin-top: 10px; font-size: 0.9em; color: #555; }
  </style>
</head>
<body>
  <h1>📰 Fake News Detector</h1>
  <p>Enter a news headline or claim:</p>
  <textarea id="claim" placeholder="e.g. 'NASA confirms Earth will go dark for 6 days'"></textarea>
  <button onclick="checkNews()">Check Claim</button>
  <div id="result"></div>

  <script>
    async function checkNews() {
      const claim = document.getElementById('claim').value.trim();
      const resultDiv = document.getElementById('result');
      if (!claim) return alert('Please enter a claim.');

      resultDiv.style.display = 'block';
      resultDiv.innerHTML = '🔍 Searching and analysing...';

      try {
        const res = await fetch('/.netlify/functions/factcheck', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ claim })
        });
        const data = await res.json();

        let verdictColor = data.verdict === 'REAL' ? 'green' : 'red';
        let html = `<h2>Verdict: <span style="color:${verdictColor}">${data.verdict}</span></h2>`;
        html += `<p>${data.explanation}</p>`;
        if (data.sources && data.sources.length) {
          html += '<div class="source"><strong>Sources:</strong><ul>';
          data.sources.forEach(s => html += `<li><a href="${s.link}" target="_blank">${s.title}</a></li>`);
          html += '</ul></div>';
        }
        resultDiv.innerHTML = html;
      } catch (err) {
        resultDiv.innerHTML = '❌ Something went wrong. Please try again.';
        console.error(err);
      }
    }
  </script>
</body>
</html>
