<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruthSniff – AI Fact Checker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
    }
    .container {
      width: 100%; max-width: 700px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
    }
    h1 { text-align: center; font-size: 2.2rem; margin-bottom: 8px; }
    .sub { text-align: center; opacity: 0.7; margin-bottom: 30px; }
    textarea {
      width: 100%; height: 100px;
      padding: 16px; font-size: 1rem;
      border: none; border-radius: 12px;
      background: rgba(255,255,255,0.1);
      color: #fff; resize: vertical;
      margin-bottom: 16px;
    }
    button {
      width: 100%; padding: 14px;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      border: none; border-radius: 12px;
      font-size: 1.1rem; font-weight: bold;
      color: #000; cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { transform: scale(1.02); opacity: 0.9; }
    #result {
      margin-top: 24px;
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 16px;
      display: none;
    }
    .verdict-real { color: #4ade80; }
    .verdict-fake { color: #f87171; }
    .verdict-misleading { color: #fbbf24; }
    .verdict-uncertain { color: #9ca3af; }
    .source { margin-top: 16px; }
    .source ul { list-style: none; padding-left: 0; }
    .source li { margin-bottom: 6px; }
    .source a { color: #93c5fd; text-decoration: none; }
    .source a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 TruthSniff</h1>
    <p class="sub">AI-powered fact checker – paste a claim, get the truth</p>
    <textarea id="claim" placeholder="e.g. 'Aliens built the pyramids'"></textarea>
    <button onclick="checkNews()">Check Claim</button>
    <div id="result"></div>
  </div>

  <script>
    async function checkNews() {
      const claim = document.getElementById('claim').value.trim();
      const resultDiv = document.getElementById('result');
      if (!claim) return alert('Please enter a claim.');

      resultDiv.style.display = 'block';
      resultDiv.innerHTML = '🔍 Searching and analysing...';

      try {
        const res = await fetch('/.netlify/functions/factcheck', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ claim })
        });
        const data = await res.json();

        let verdictClass = '';
        switch(data.verdict) {
          case 'REAL': verdictClass = 'verdict-real'; break;
          case 'FAKE': verdictClass = 'verdict-fake'; break;
          case 'MISLEADING': verdictClass = 'verdict-misleading'; break;
          default: verdictClass = 'verdict-uncertain';
        }

        let html = `<h2>Verdict: <span class="${verdictClass}">${data.verdict}</span></h2>`;
        html += `<p>${data.explanation}</p>`;
        if (data.sources && data.sources.length) {
          html += '<div class="source"><strong>Sources:</strong><ul>';
          data.sources.forEach(s => html += `<li><a href="${s.link}" target="_blank">${s.title}</a></li>`);
          html += '</ul></div>';
        }
        resultDiv.innerHTML = html;
      } catch (err) {
        resultDiv.innerHTML = '❌ Something went wrong. Please try again.';
        console.error(err);
      }
    }
  </script>
</body>
</html>
